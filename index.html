<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Fiesta — The Last Party on Earth</title>
    <style>
      :root {
        --ink: #1c1c22;
        --fiesta-pink: #ff3ea5;
        --fiesta-cyan: #2ee6e6;
        --fiesta-yellow: #ffd23f;
        --fiesta-lime: #6ee86e;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0c0c0f;
        font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
        color: #fff;
        cursor: default;
      }
      #app { position: fixed; inset: 0; }
      canvas { display: block; width: 100%; height: 100%; }

      /* HUD + overlays are injected/managed by src/ui.ts */
      #ui-root { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
      #ui-root .clickable { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="ui-root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
